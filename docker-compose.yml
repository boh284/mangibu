services:
  db:
    image: postgres:17
    restart: always
    
    env_file:
      - .env
    
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mangibu:mangibu@db:5432/mangibu

volumes:
  pgdata:
